services:
  postgres:
    image: postgres:16-alpine
    container_name: digital-talk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: digital_talk
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - digital-talk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d digital_talk"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: digital-talk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - digital-talk-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  digital-talk-postgres-data:
  digital-talk-redis-data:
